name: Release APK

on:
  push:
    tags:
      - 'v*'        # v1.0, v1.2.3 等
  workflow_dispatch:  # 也可以手动触发
    inputs:
      version:
        description: '版本号（如 v1.0.1）'
        required: true
        default: 'v1.0.0'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: ☕ 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 生成 Gradle Wrapper
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version=8.5
          fi

      - name: 🗂️ 缓存 Gradle 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── APK 签名（如配置了签名密钥） ──
      - name: 🔑 解码签名密钥
        id: decode_keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > app/upload-keystore.jks
            echo "keystore_available=true" >> $GITHUB_OUTPUT
          else
            echo "keystore_available=false" >> $GITHUB_OUTPUT
            echo "⚠️ 未配置 KEYSTORE_BASE64 密钥，将使用 debug 签名"
          fi

      - name: 🔨 构建 Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          if [ "${{ steps.decode_keystore.outputs.keystore_available }}" == "true" ]; then
            echo "使用 release 签名构建"
            ./gradlew assembleRelease --stacktrace
          else
            echo "使用 debug 签名构建（可安装，但非正式发布签名）"
            ./gradlew assembleRelease --stacktrace
          fi

      - name: 📤 上传 APK（构建产物）
        uses: actions/upload-artifact@v7
        with:
          name: EbookReader-Release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      # ── 提取版本号 ──
      - name: 🏷️ 提取版本号
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      # ── 生成 Release Notes ──
      - name: 📝 生成 Release Notes
        id: release_notes
        run: |
          cat > release_notes.md << 'EOF'
          ## 📱 文境阅读 ${{ steps.get_version.outputs.version }}

          ### 安装说明
          1. 下载下方的 APK 文件
          2. 在手机上打开，如果提示「未知来源」，允许安装
          3. 如果已安装旧版本，直接覆盖升级，数据不会丢失

          ### 格式支持
          - ✅ ePub / PDF / MOBI / AZW3 / FB2 / CBZ / CBR
          - ✅ 三主题切换（白昼 / 羊皮纸 / 夜间）
          - ✅ 字号 / 亮度调节
          - ✅ 阅读进度自动保存

          ### 构建信息
          - 构建时间: $(date '+%Y-%m-%d %H:%M UTC')
          - 提交: ${{ github.sha }}
          EOF

      # ── 创建 GitHub Release ──
      - name: 🚀 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: 文境阅读 ${{ steps.get_version.outputs.version }}
          body_path: release_notes.md
          files: |
            app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
